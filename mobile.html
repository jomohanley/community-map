<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where are you from?</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .input-group { position: relative; text-align: left; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        #suggestions { border: 1px solid #ddd; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; background: white; display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #f0f0f0; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .success { color: #28a745; display: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="formCard">
    <h2>Add Your Location</h2>
    <div class="input-group">
        <input type="text" id="citySearch" placeholder="Start typing your city..." autocomplete="off">
        <div id="suggestions"></div>
    </div>
    <button id="submitBtn" disabled>Pin My Location</button>
    <div class="success" id="message">✓ Location Added!</div>
</div>

<script>
    // 1. Define variables with NO spaces or trailing slashes
    const URL = 'https://gfkqkhijzacsyzowpvag.supabase.co'.trim();
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4'.trim();
    
    //const URL = 'https://gfkqkhijzacsyzowpvag.supabase.co';
    //const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4';



    
    // This line uses the library (supabase) to create our client (mapDb)
    const mapDb = supabase.createClient(URL, KEY);

    const input = document.getElementById('citySearch');
    const suggestions = document.getElementById('suggestions');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    let selectedLocation = null;
    let timeout = null;

    // Listen for typing with a slight delay (debounce) to save API hits
    input.addEventListener('input', () => {
        clearTimeout(timeout);
        const query = input.value;
        if (query.length < 3) {
            suggestions.style.display = 'none';
            return;
        }

        timeout = setTimeout(async () => {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&addressdetails=1&limit=5`);
            const data = await res.json();
            
            suggestions.innerHTML = '';
            if (data.length > 0) {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = item.display_name;
                    div.onclick = () => selectCity(item);
                    suggestions.appendChild(div);
                });
                suggestions.style.display = 'block';
            }
        }, 300);
    });

    function selectCity(item) {
        input.value = item.display_name;
        selectedLocation = {
            city: item.address.city || item.address.town || item.address.village || item.display_name.split(',')[0],
            country: item.address.country,
            lat: item.lat,
            lon: item.lon
        };
        suggestions.style.display = 'none';
        submitBtn.disabled = false;
    }

    submitBtn.onclick = async () => {
        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending...';

        // Get current count
        const { data: existing } = await mapDb.from('locations')
            .select('count')
            .match({ city: selectedLocation.city, country: selectedLocation.country })
            .single();
        
        const newCount = existing ? existing.count + 1 : 1;

        // Save to Supabase
        const { error } = await mapDb.from('locations').upsert({ 
            city: selectedLocation.city, 
            country: selectedLocation.country, 
            lat: selectedLocation.lat, 
            lon: selectedLocation.lon, 
            count: newCount 
        }, { onConflict: 'city,country' });

        if (!error) {
            input.style.display = 'none';
            submitBtn.style.display = 'none';
            message.style.display = 'block';
            setTimeout(() => location.reload(), 3000);
        } else {
            alert("Error saving location. Please try again.");
            submitBtn.disabled = false;
            submitBtn.innerText = 'Pin My Location';
        }
    };
</script>

</body>
</html>
