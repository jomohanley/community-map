<!DOCTYPE html>
<html>
<head>
    <title>Map Admin - Secure</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f9f9f9; }
        #adminContent { display: none; }
        .login-container { max-width: 400px; margin: auto; text-align: center; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .google-btn { padding: 12px 24px; background: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .delete-btn { color: #ff4d4d; border: 1px solid #ff4d4d; background: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .delete-btn:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-container">
        <h2>Admin Access</h2>
        <p>Please sign in with your authorized Google account to manage map pins.</p>
        <button class="google-btn" onclick="signInWithGoogle()">Login with Google</button>
    </div>

    <div id="adminContent">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Map Submissions</h2>
            <button onclick="signOut()" style="padding: 8px 16px;">Sign Out</button>
        </div>
        <table id="adminTable">
            <thead>
                <tr><th>City</th><th>Country</th><th>Count</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // Wrap everything in a listener that waits for the page to load
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Configuration
            const SB_URL = 'https://gfkqkhijzacsyzowpvag.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4';
        
            // 2. Initialize
            const adminDb = supabase.createClient(SB_URL, SB_KEY);
        
            const loginSection = document.getElementById('login-section');
            const adminSection = document.getElementById('admin-section');
            const locationList = document.getElementById('location-list');
        
            // 3. Listen for Auth Changes
            adminDb.auth.onAuthStateChange((event, session) => {
                if (session) {
                    if(loginSection) loginSection.style.display = 'none';
                    if(adminSection) adminSection.style.display = 'block';
                    fetchLocations();
                } else {
                    if(loginSection) loginSection.style.display = 'block';
                    if(adminSection) adminSection.style.display = 'none';
                }
            });
        
            // Make functions global so the buttons can find them
            window.signIn = async () => {
                await adminDb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href }
                });
            };
        
            window.signOut = async () => {
                await adminDb.auth.signOut();
                location.reload();
            };
        
            window.fetchLocations = async () => {
                const { data } = await adminDb.from('locations').select('*').order('city', { ascending: true });
                if (data && locationList) {
                    locationList.innerHTML = data.map(loc => `
                        <tr>
                            <td>${loc.city}, ${loc.country}</td>
                            <td>${loc.count}</td>
                            <td><button class="delete-btn" onclick="deleteLocation(${loc.id})">Delete</button></td>
                        </tr>
                    `).join('');
                }
            };
        
            window.deleteLocation = async (id) => {
                if (confirm("Are you sure?")) {
                    const { error } = await adminDb.from('locations').delete().eq('id', id);
                    if (error) {
                        alert("Only the authorized admin email can delete pins.");
                    } else {
                        fetchLocations();
                    }
                }
            };
        });
    </script>
</body>
</html>
