<!DOCTYPE html>
<html>
<head>
    <title>Our World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; height: 500px; }
        .input-panel { padding: 20px; background: white; border-top: 1px solid #ccc; display: flex; gap: 10px; justify-content: center; align-items: center; }
        #qrcode { margin-left: 15px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="input-panel">
        <input type="text" id="city" placeholder="City (e.g. Toronto)">
        <input type="text" id="country" placeholder="Country (e.g. Canada)">
        <button onclick="submitLoc()">Add My City</button>
        <div id="qrcode"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // 1. We name our variable 'mapDb' to avoid clashing with the 'supabase' library name
        const URL = 'https://gfkqkhijzacsyzowpvag.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4';
        
        // This line uses the library (supabase) to create our client (mapDb)
        const mapDb = supabase.createClient(URL, KEY);

        // 2. Initialize Map
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 3. Generate QR Code
        new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 100,
                height: 100
        });
       // new QRCode(document.getElementById("qrcode"), {
       //     text: window.location.href.replace('index.html', '') + "mobile.html",
       //     width: 80,
       //     height: 80
       // });

        async function loadPins() {
            const { data } = await mapDb.from('locations').select('*');
            if (data) {
                data.forEach(l => {
                    L.marker([l.lat, l.lon]).addTo(map).bindPopup(`<b>${l.city}</b>: ${l.count} user(s)`);
                });
            }
        }

        async function submitLoc() {
            const city = document.getElementById('city').value;
            const country = document.getElementById('country').value;
            if(!city || !country) return alert("Please fill in both fields!");

            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city},${country}`);
            const geo = await res.json();
            
            if (geo.length > 0) {
                const { lat, lon } = geo[0];
                
                // Fetch existing count
                const { data: existing } = await mapDb.from('locations')
                    .select('count')
                    .match({city, country})
                    .single();
                
                const newCount = existing ? existing.count + 1 : 1;

                // Save/Update
                await mapDb.from('locations').upsert({ 
                    city, country, lat, lon, count: newCount 
                }, { onConflict: 'city,country' });

                alert("Pinned!");
                location.reload();
            } else {
                alert("Location not found.");
            }
        }
        loadPins();
    </script>
</body>
</html>
