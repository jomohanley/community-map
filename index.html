<!DOCTYPE html>
<html>
<head>
    <title>Our World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; height: 500px; }
        .input-panel { padding: 20px; background: white; border-top: 1px solid #ccc; display: flex; gap: 10px; justify-content: center; align-items: center; }
        #qrcode { margin-left: 15px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="input-panel">
        <input type="text" id="city" placeholder="City (e.g. Toronto)">
        <input type="text" id="country" placeholder="Country (e.g. Canada)">
        <button onclick="submitLoc()">Add My City</button>
        <div id="qrcode"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // 1. Define variables with NO spaces or trailing slashes
        const SB_URL = 'https://gfkqkhijzacsyzowpvag.supabase.co'.trim();
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4'.trim();
       
        // ... (Your existing SB_URL and SB_KEY code) ...
        const mapDb = supabase.createClient(SB_URL, SB_KEY);
        
        // 1. Create a place to store our markers so we can find them later
        const markerStorage = {};
        
        // 2. Updated function to handle pins
        function addPinToMap(l) {
            const key = `${l.city}-${l.country}`;
            
            // If a pin for this city already exists on the map, remove it first
            if (markerStorage[key]) {
                map.removeLayer(markerStorage[key]);
            }
        
            // Create the new marker with the updated count
            const newMarker = L.marker([l.lat, l.lon])
                .addTo(map)
                .bindPopup(`<b>${l.city}</b>: ${l.count} user(s)`);
            
            // Save the new marker to our storage
            markerStorage[key] = newMarker;
        }
        
        // 3. Update the Realtime Listener
        mapDb
          .channel('schema-db-changes')
          .on(
            'postgres_changes',
            {
              event: '*', // Listen for both INSERT and UPDATE
              schema: 'public',
              table: 'locations',
            },
            (payload) => {
                // Use payload.new to get the updated row data
                if (payload.new && payload.new.lat) {
                    addPinToMap(payload.new);
                }
            }
          )
          .subscribe();
        
        loadPins();
    </script>
</body>
</html>
