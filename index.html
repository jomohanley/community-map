<!DOCTYPE html>
<html>
<head>
    <title>Our World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; height: 500px; }
        .input-panel { padding: 20px; background: white; border-top: 1px solid #ccc; display: flex; gap: 10px; justify-content: center; align-items: center; }
        .container {
          display: flex; /* Aligns children horizontally */
          align-items: center; /* Vertically centers the text relative to the image */
          gap: 15px; /* Adds space between the image and text */
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="input-panel">
    	<div class="container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/General_Motors_%282021%29.svg/960px-General_Motors_%282021%29.svg.png" width="80" height="80">
            <h1>Oshawa Campus Origins Map</h1>
            <img src="./community-map-mobile-qr.png" width="80" height="80">
        </div>
        <div id="counter-box" style="padding: 10px; background: white; text-align: center; font-weight: bold; border-bottom: 1px solid #ccc;">
            Total Location Submissions: <span id="total-count">0</span>
        </div>        
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        // 1. Setup global variables first
        const SB_URL = 'https://gfkqkhijzacsyzowpvag.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma3FraGlqemFjc3l6b3dwdmFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzkyMDAsImV4cCI6MjA5MjAxNTIwMH0.09A6_FDSLKZ0QCx8WLgfOvn4ctlgmUmL1g40cOKedA4';
        const mapDb = supabase.createClient(SB_URL, SB_KEY);
        
        const markerStorage = {};
        
        // 2. Initialize the Map
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // 3. Define the functions (Put these BEFORE they are called)
        function addPinToMap(l) {
                if (!l) return;
                const key = `${l.city}-${l.country}`;
                if (markerStorage[key]) map.removeLayer(markerStorage[key]);
            
                const newMarker = L.marker([l.lat, l.lon])
                    .addTo(map)
                    .bindPopup(`<b>${l.city}</b>: ${l.count} user(s)`);
                
                markerStorage[key] = newMarker;
        }
        // Function to calculate and display the total
        async function updateTotalDisplay() {
            const { data } = await mapDb.from('locations').select('count');
            if (data) {
                const total = data.reduce((sum, row) => sum + (row.count || 0), 0);
                document.getElementById('total-count').innerText = total;
            }
        }
        
        async function loadPins() {
            const { data } = await mapDb.from('locations').select('*');
            if (data) {
                data.forEach(l => addPinToMap(l));
                updateTotalDisplay(); // Initial count
            }
        }
        
        // Update the Realtime Listener to also refresh the counter
        mapDb
          .channel('schema-db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'locations' }, 
          (payload) => {
              if (payload.new && payload.new.lat) {
                  addPinToMap(payload.new);
                  updateTotalDisplay(); // Live update the total!
              } else if (payload.eventType === 'DELETE') {
                  location.reload(); 
              }
          })
          .subscribe();
        
        // 5. Run the initial load
        loadPins();
    </script>
</body>
</html>
